# Railway / Nixpacks build configuration.
#
# Without this file, Nixpacks sees the root package.json (geolibre-wasm WASM
# deps, which are already vendored in frontend/wasm/) and auto-detects a
# Node.js project — so there is no Python and `pip` is missing at build time.
# We force the Python toolchain and install the FastAPI backend deps.

providers = ['python']

[phases.setup]
nixPkgs = ['python311']

[phases.install]
cmds = [
  'python -m venv --copies /opt/venv',
  '. /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt',
]

[start]
cmd = '. /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'
